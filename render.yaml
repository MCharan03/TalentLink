services:
  - type: web
    name: talentlink-neural-link
    env: docker
    dockerContext: ./web
    dockerfilePath: ./web/Dockerfile
    plan: free # Use 'free' or 'starter' depending on requirements
    region: ohio # Change to your preferred region
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: ADMIN_EMAIL
        value: admin@talentlink.ai
      - key: ADMIN_PASSWORD
        value: admin_pass
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:////app/backend/data/talentlink.db # Absolute path to persistent disk
    disk:
      name: talentlink-db-disk
      mountPath: /app/backend/data
